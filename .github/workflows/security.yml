name: Security verification

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bridge-api/package-lock.json
      - working-directory: bridge-api
        run: npm ci
      - working-directory: bridge-api
        run: npm test
      - working-directory: bridge-api
        run: npm run verify:secrets
      - working-directory: bridge-api
        run: npm audit --audit-level=high
